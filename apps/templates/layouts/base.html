<!DOCTYPE html>
<html lang="en" {% block html_attributes %}{% endblock %} {% if rtl %} dir="rtl" {% endif %}>

<head>
    <meta charset="utf-8"/>
    <title>{{ title }} | Adminto - Responsive Bootstrap 5 Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="A fully featured admin theme which can be used to build CRM, CMS, etc." name="description"/>
    <meta content="Coderthemes" name="author"/>

    <!-- App favicon -->
    <link rel="shortcut icon" href="{{ config.ASSETS_ROOT }}/images/favicon.ico">

    {% block styles %}{% endblock %}

    <link href="{{ config.ASSETS_ROOT }}/css/vendor.min.css" rel="stylesheet" type="text/css"/>
    <link href="{{ config.ASSETS_ROOT }}/css/icons.min.css" rel="stylesheet" type="text/css"/>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />

    {% if rtl %}
        <link href="{{ config.ASSETS_ROOT }}/css/app-rtl.min.css" rel="stylesheet" type="text/css"/>
    {% else %}
        <link href="{{ config.ASSETS_ROOT }}/css/app.min.css" rel="stylesheet" type="text/css"/>
    {% endif %}

    <script src="{{ config.ASSETS_ROOT }}/js/config.js"></script>
</head>

<body {% block body_attributes %}{% endblock %}>

{% block page_content %}{% endblock %}

<script src="{{ config.ASSETS_ROOT }}/js/vendor.min.js"></script>
<script src="{{ config.ASSETS_ROOT }}/js/app.js"></script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

{% block scripts %}{% endblock %}

</body>
</html>
